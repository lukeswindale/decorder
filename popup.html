<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Decorder</title>
  <style>
    body {
      font-family: "Google Sans", Roboto, sans-serif;
      margin: 0;
      padding: 16px;
      min-width: 220px;
      background: #fff;
      color: #202124;
    }
    h1 {
      font-size: 14px;
      font-weight: 500;
      margin: 0 0 12px;
      color: #1a73e8;
    }
    #status {
      font-size: 12px;
      min-height: 16px;
      margin-bottom: 10px;
      color: #5f6368;
    }
    button {
      background: #1a73e8;
      color: #fff;
      border: none;
      border-radius: 4px;
      padding: 8px 16px;
      font-size: 13px;
      cursor: pointer;
      width: 100%;
    }
    button:disabled {
      background: #dadce0;
      color: #80868b;
      cursor: not-allowed;
    }
  </style>
</head>
<body>
  <h1>Decorder</h1>
  <div id="status">Ready</div>
  <button id="startBtn">Start Download</button>
  <script src="popup.js"></script>
</body>
</html>
